<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reoveons Place</title>

<link rel="stylesheet" href="styles.css">

</head>

<body>

<div id="particles"></div>

<header>

<h1>Reoveons Place</h1>

<div class="nav">

<button data-section="tools">Tools</button>
<button data-section="themes">Themes</button>
<button data-section="profile">Profile</button>
<button id="devBtn">⚡</button>

</div>

</header>

<main>

<section id="tools" class="panel active">

<h2>Toolbox</h2>

<div class="tool">
<h3>AI Username Generator</h3>
<button onclick="generateUsername()">Generate</button>
<p id="usernameOutput"></p>
</div>

<div class="tool">

<h3>Background Remover</h3>

<input type="file" id="imageUpload">
<input type="color" id="removeColor" value="#ffffff">
<button onclick="removeBackground()">Remove Background</button>

<div class="preview">
<img id="originalPreview">
<canvas id="canvas"></canvas>
</div>

</div>

</section>

<section id="themes" class="panel">

<h2>Themes</h2>

<button onclick="setTheme('dark')">Dark</button>
<button onclick="setTheme('neon')">Neon</button>
<button onclick="setTheme('galaxy')">Galaxy</button>

</section>

<section id="profile" class="panel">

<h2>Profile</h2>

<input id="profileName" placeholder="Username">
<input type="file" id="profilePic">

<div id="profileCard"></div>

<button onclick="saveProfile()">Save</button>

</section>

</main>

<div id="devPanel">

<h3>Developer Panel</h3>

<button onclick="spawnParticles()">More Particles</button>
<button onclick="randomTheme()">Random Theme</button>

</div>

<script src="app.js"></script>

</body>
</html>
