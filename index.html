<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Reoveons Soft Place</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="background"></div>
<div class="fireplace"></div>

<canvas id="particles"></canvas>

<header>

<h2>🌸 Reoveons Soft Place</h2>

<nav>

<button onclick="switchTab('home')">Home</button>
<button onclick="switchTab('remover')">Background Remover</button>
<button onclick="switchTab('username')">Username Gen</button>
<button onclick="switchTab('font')">Font Loader</button>
<button onclick="switchTab('socials')">Socials</button>
<button onclick="toggleDark()">🌙</button>

</nav>

</header>


<main>

<!-- HOME -->

<section id="home" class="tab active">

<div class="card">

<h1>reoveon</h1>
<p>"soft spaces create soft minds"</p>
<p>welcome to my cozy place on the internet</p>

</div>

</section>


<!-- BACKGROUND REMOVER -->

<section id="remover" class="tab">

<div class="card">

<h2>Background Remover</h2>

<input type="file" id="imageUpload" multiple>

<br><br>

<input type="color" id="removeColor" value="#ffffff">

<button onclick="removeBackground()">Remove</button>

<div id="imageContainer"></div>

</div>

</section>


<!-- USERNAME GENERATOR -->

<section id="username" class="tab">

<div class="card">

<h2>Username Generator</h2>

<label>Length</label>
<input type="number" id="charLength" min="1" max="10" value="5">

<br><br>

<label>Amount</label>
<input type="number" id="userAmount" min="1" max="100" value="10">

<br><br>

<button onclick="generateUsernames()">Generate</button>

<div id="usernameList"></div>

</div>

</section>


<!-- FONT LOADER -->

<section id="font" class="tab">

<div class="card">

<h2>Font Loader</h2>

<input type="file" id="fontUpload" accept=".ttf,.otf">

<br><br>

<input type="text" id="fontText" placeholder="Type text">

<br><br>

<button onclick="renderFont()">Render</button>

<canvas id="fontCanvas"></canvas>

</div>

</section>


<!-- SOCIALS -->

<section id="socials" class="tab">

<div class="card">

<h2>Socials</h2>

<div class="social">

<a href="https://youtube.com/@reoveon" target="_blank">YouTube → reoveon</a>

<a href="https://tiktok.com/@reoveon" target="_blank">TikTok → reoveon</a>

<a href="https://discord.com/users/he5k" target="_blank">Discord → he5k</a>

</div>

</div>

</section>

</main>


<!-- MUSIC PLAYER -->

<div class="musicPlayer">

<button onclick="toggleMusic()">▶ / ⏸</button>

<input type="range" min="0" max="1" step="0.01" value="0.5" id="volume">

</div>

<audio id="music" loop>
<source src="music.mp3">
</audio>

<script src="script.js"></script>

</body>
</html>
