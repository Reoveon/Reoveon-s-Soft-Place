<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<title>Reoveons Place</title>

<style>

body{
margin:0;
font-family:Segoe UI;
background:#0f0f0f;
color:white;
}

nav{
position:fixed;
top:15px;
right:20px;
z-index:1000;
}

nav button{
margin-left:10px;
padding:10px 16px;
border:none;
border-radius:8px;
background:#222;
color:white;
cursor:pointer;
transition:.2s;
}

nav button:hover{
background:#00d9ff;
color:black;
}

.page{
display:none;
padding:90px 30px;
}

.active{
display:block;
}

.panel{
background:#1b1b1b;
padding:25px;
border-radius:10px;
max-width:1000px;
margin:auto;
}

canvas{
border:1px solid white;
margin-top:10px;
max-width:300px;
display:block;
}

input,button,select{
margin-top:8px;
padding:8px;
border-radius:6px;
border:none;
}

.imageRow{
display:flex;
flex-wrap:wrap;
gap:20px;
}

</style>

</head>

<body>

<nav>
<button onclick="showPage('home')">Home</button>
<button onclick="showPage('themes')">Themes</button>
<button onclick="showPage('username')">Username</button>
<button onclick="showPage('bgremove')">BG Remover</button>
<button onclick="showPage('tools')">Tools</button>
</nav>

<div id="home" class="page active">
<div class="panel">
<h1>Reoveons Place</h1>
<p>Ultimate Tool Hub</p>
</div>
</div>

<div id="themes" class="page">
<div class="panel">

<h2>Themes</h2>

Background Color<br>
<input type="color" id="bgColor"><br>

Text Color<br>
<input type="color" id="textColor"><br><br>

<button onclick="applyTheme()">Apply Theme</button>

</div>
</div>

<div id="username" class="page">
<div class="panel">

<h2>Username Generator</h2>

Length<br>
<input id="nameLength" type="number" value="10"><br>

How many usernames?<br>
<input id="nameCount" type="number" value="5"><br><br>

<button onclick="generateUsernames()">Generate</button>

<div id="nameOutput"></div>

</div>
</div>

<div id="bgremove" class="page">
<div class="panel">

<h2>Background Remover</h2>

Color To Remove<br>
<input type="color" id="removeColor"><br>

Tolerance<br>
<input type="range" min="10" max="150" value="60" id="tolerance"><br><br>

<input type="file" id="upload" multiple><br><br>

<div class="imageRow" id="imageContainer"></div>

<br>

<button onclick="removeBackground()">Remove Background</button>

</div>
</div>

<div id="tools" class="page">
<div class="panel">

<h2>Tools</h2>

<button onclick="clearCanvas()">Clear Images</button>
<button onclick="downloadAll()">Download All</button>

</div>
</div>

<script src="app.js"></script>

</body>
</html>
