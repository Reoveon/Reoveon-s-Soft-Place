<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cozy Toolkit</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<canvas id="bgParticles"></canvas>

<header>
<h1>Cozy Toolkit</h1>

<div class="controls">
<button onclick="toggleDark()">Dark Mode</button>
<button onclick="toggleMusic()">Music</button>
<input type="range" id="volume" min="0" max="1" step="0.01" value="0.5">
</div>
</header>

<audio id="music" loop>
<source src="music.mp3" type="audio/mpeg">
</audio>

<div class="container">

<h2>Background Remover</h2>

<div id="dropZone">Drag & Drop Images Here or Click</div>
<input type="file" id="imageUpload" multiple hidden>

<label>Color To Remove</label>
<input type="color" id="removeColor" value="#ffffff">

<button onclick="removeBackground()">Remove Background</button>

<div id="imageContainer"></div>

<h2>Font Image Generator</h2>

<input type="file" id="fontUpload" accept=".ttf,.otf">
<input type="text" id="fontText" placeholder="Type text here">

<button onclick="renderFont()">Render Text</button>

<canvas id="fontCanvas"></canvas>

</div>

<script src="script.js"></script>
</body>
</html>
