<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Reoveons Soft Place</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="background"></div>
<div class="fireplace"></div>

<canvas id="particles"></canvas>

<header>

<h2>🌸 Reoveons Soft Place</h2>

<nav>
<button onclick="switchTab('home')">Home</button>
<button onclick="switchTab('tools')">Tools</button>
<button onclick="switchTab('socials')">Socials</button>
<button onclick="toggleDark()">🌙</button>
</nav>

</header>


<main>

<section id="home" class="tab active">

<div class="card">

<h1>reoveon</h1>

<p>"soft spaces create soft minds"</p>

<p>welcome to my cozy corner of the internet</p>

</div>

</section>


<section id="tools" class="tab">

<div class="card">

<h2>Tools</h2>

<p>background remover</p>
<p>username generator</p>
<p>font loader</p>

</div>

</section>


<section id="socials" class="tab">

<div class="card">

<h2>Socials</h2>

<div class="social">

<a href="https://youtube.com/@reoveon" target="_blank">YouTube → reoveon</a>

<a href="https://tiktok.com/@reoveon" target="_blank">TikTok → reoveon</a>

<a href="https://discord.com/users/he5k" target="_blank">Discord → he5k</a>

</div>

</div>

</section>

</main>


<!-- MUSIC PLAYER -->

<div class="musicPlayer">

<button onclick="toggleMusic()">▶ / ⏸</button>

<input type="range" min="0" max="1" step="0.01" value="0.5" id="volume">

</div>


<audio id="music" loop>
<source src="music.mp3">
</audio>

<script src="script.js"></script>

</body>
</html>
