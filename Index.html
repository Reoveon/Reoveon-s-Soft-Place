<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Reoveons Soft Place</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<header>
<h1>🌸 Reoveons Soft Place</h1>

<div class="menu">
<button onclick="showSection('remover')">Background Remover</button>
<button onclick="showSection('username')">Username Generator</button>
<button onclick="showSection('font')">Font Loader</button>
</div>
</header>


<main>

<!-- Background Remover -->
<section id="remover" class="section active">

<h2>Background Remover</h2>

<input type="file" id="imageUpload" multiple>

<label>Color to Remove</label>
<input type="color" id="removeColor" value="#ffffff">

<button onclick="removeBackground()">Remove Background</button>

<div id="imageContainer"></div>

</section>


<!-- Username Generator -->
<section id="username" class="section">

<h2>Username Generator</h2>

<label>Character Length (1-10)</label>
<input type="number" id="charLength" min="1" max="10" value="5">

<label>Amount (1-100)</label>
<input type="number" id="userAmount" min="1" max="100" value="10">

<button onclick="generateUsernames()">Generate</button>

<div id="usernameList"></div>

</section>


<!-- Font Loader -->
<section id="font" class="section">

<h2>Font Loader</h2>

<input type="file" id="fontUpload" accept=".ttf,.otf">

<input type="text" id="fontText" placeholder="Type something...">

<button onclick="renderFont()">Render</button>

<canvas id="fontCanvas"></canvas>

</section>


</main>

<script src="script.js"></script>

</body>
</html>
